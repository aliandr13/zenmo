spring.application.name=zenmo

# --- HTTP ---
server.port=8080

# --- DB (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/zenmo
spring.datasource.username=zenmo
spring.datasource.password=zenmo

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Auth (JWT) ---
# Provide a long random value in production (>= 32 bytes recommended for HS256).
zenmo.jwt.secret=dev-change-me-dev-change-me-dev-change-me
zenmo.jwt.issuer=zenmo
zenmo.jwt.access-ttl-seconds=900
zenmo.jwt.refresh-ttl-seconds=2592000
# --- Actuator (health + info only) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=zenmo
info.app.description=Spending and credit card tracker API
