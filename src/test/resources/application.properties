spring.datasource.url=jdbc:h2:mem:zenmo-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

zenmo.jwt.secret=test-secret-test-secret-test-secret
zenmo.jwt.issuer=zenmo-test
zenmo.jwt.access-ttl-seconds=900
zenmo.jwt.refresh-ttl-seconds=2592000

