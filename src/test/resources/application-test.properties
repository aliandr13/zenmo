# Unique DB per ApplicationContext so schema-h2.sql can run when multiple @SpringBootTest classes load contexts in one JVM
spring.datasource.url=jdbc:h2:mem:zenmo_${random.uuid};DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.flyway.enabled=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql

zenmo.jwt.secret=test-secret-test-secret-test-secret
zenmo.jwt.issuer=zenmo-test
zenmo.jwt.access-ttl-seconds=900
zenmo.jwt.refresh-ttl-seconds=2592000
