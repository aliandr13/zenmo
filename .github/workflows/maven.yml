# Maven build/test on every push and PR to main; Docker images publish to GHCR only after
# a successful build on main (same workflow run, sequential jobs).

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by separate terms of service,
# privacy policy, and support documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: zenmo-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # dependency graph submission API

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven
      - name: Build with Maven
        run: mvn -B clean install --file pom.xml

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5.0.0

  publish:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write # BuildKit GHA cache (cache-to type=gha)

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: zenmo-app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/zenmo-back:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/zenmo-back:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: zenmo-migrate/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/zenmo-migrate:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/zenmo-migrate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
