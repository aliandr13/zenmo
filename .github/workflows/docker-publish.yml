# Build and push API + Flyway migrate images to GHCR on merge to main.
# Images: ghcr.io/<owner>/zenmo-back, ghcr.io/<owner>/zenmo-migrate

name: Publish Docker images

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  actions: write # BuildKit GHA cache (cache-to type=gha)

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Run tests (Dockerfile builds skip tests)
        run: mvn -B verify --file pom.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: zenmo-app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/zenmo-back:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/zenmo-back:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: zenmo-migrate/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/zenmo-migrate:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/zenmo-migrate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
