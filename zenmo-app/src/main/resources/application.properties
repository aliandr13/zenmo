spring.application.name=zenmo
spring.main.banner-mode=off
# Default profile: dev (use --spring.profiles.active=prod for production)
spring.profiles.active=dev
spring.main.lazy-initialization=true
logging.level.root=INFO
logging.level.org.springframework=WARN
# Rolling file logs (see logback-spring.xml); override with LOGGING_FILE_PATH env
logging.file.path=logs
# --- HTTP ---
server.port=8080
# config for 1CPU 512MB RAM (Jetty)
server.jetty.threads.max=20
server.jetty.threads.max-queue-capacity=40
server.jetty.connection-idle-timeout=10s
server.compression.enabled=true
# --- DB (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/zenmo
spring.datasource.username=zenmo
spring.datasource.password=zenmo
# --- Auth (JWT) ---
# Provide a long random value in production (>= 32 bytes recommended for HS256).
zenmo.jwt.secret=dev-change-me-dev-change-me-dev-change-me
zenmo.jwt.issuer=zenmo
zenmo.jwt.access-ttl-seconds=900
zenmo.jwt.refresh-ttl-seconds=2592000
# --- Actuator (health + info only) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=zenmo
info.app.description=Spending and credit card tracker API
