spring.application.name=zenmo
spring.main.banner-mode=off
# IMPORTANT: override via env in production
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.main.lazy-initialization=true

logging.level.root=INFO
logging.level.org.springframework=WARN
logging.file.path=logs

# --- HTTP ---
server.port=8080
server.compression.enabled=true
# Jetty (keep minimal here; prefer Docker env overrides)
server.jetty.threads.max=20
server.jetty.threads.min=10
server.jetty.connection-idle-timeout=30s

# --- DB (PostgreSQL) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/zenmo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:zenmo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:zenmo}

# --- Auth (JWT) ---
zenmo.jwt.secret=${ZENMO_JWT_SECRET:change-me}
zenmo.jwt.issuer=zenmo
zenmo.jwt.access-ttl-seconds=900
zenmo.jwt.refresh-ttl-seconds=2592000
# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=zenmo
info.app.description=Spending and credit card tracker API