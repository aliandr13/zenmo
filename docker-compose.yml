# Full stack: Postgres → Flyway migrate → API (internal) → UI (Caddy on :80, optional :443).
# From this directory:
#   docker compose up --build
# App: http://localhost:${HTTP_PORT:-80} — Caddy serves the SPA and proxies /api to the API container.
# Production HTTPS: mount zenmo-ui/caddy/Caddyfile.production on the ui service as /etc/caddy/Caddyfile
# and set CADDY_ACME_EMAIL; publish HTTPS_PORT (default 443). Caddy data (certs) persists in volume caddy_data.
# Build-time UI API base: VITE_API_URL=relative (default) for same-origin /api; override for split-host builds.
#
# API: defaults to Spring prod profile. Set ZENMO_JWT_SECRET (required), e.g.:
#   ZENMO_JWT_SECRET="$(openssl rand -base64 48)" docker compose up
# The API is not published on the host; reach it only via the UI proxy or `docker compose exec api …`.
# API file logs: host dir `API_LOGS_PATH` (default ./logs/api) → container /app/logs. Override: API_LOGS_PATH=/var/log/zenmo docker compose up -d
# API JVM: JAVA_TOOL_OPTIONS mirrors zenmo-back/start-app.sh (JAVA_OPTS + SPRING_OPTS).

name: zenmo

services:
  postgres:
    image: postgres:18
    container_name: zenmo-db
    restart: unless-stopped
    command: [ "postgres", "-c", "config_file=/etc/postgresql/postgresql.conf" ]

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zenmo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zenmo}
      POSTGRES_DB: ${POSTGRES_DB:-zenmo}
    volumes:
      # Standard PGDATA path. If upgrading from a volume mounted on /var/lib/postgresql, migrate data once.
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zenmo}" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 600m

  migrate:
    image: ghcr.io/aliandr13/zenmo-migrate:latest
    environment:
      ZENMO_DATASOURCE_URL: jdbc:postgresql://postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      ZENMO_DATASOURCE_USERNAME: ${POSTGRES_USER}
      ZENMO_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  api:
    image: ghcr.io/aliandr13/zenmo-back:latest
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: >-
        -server
        -Xms256m
        -Xmx768m
        -XX:MaxMetaspaceSize=192m
        -XX:ReservedCodeCacheSize=96m
        -Xss256k
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+UseStringDeduplication
        -XX:+ExitOnOutOfMemoryError
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.main.banner-mode=off
        -Dspring.main.lazy-initialization=true
        -Dserver.jetty.threads.max=20
        -Dserver.jetty.threads.min=10
        -Dserver.jetty.max-connections=300
        -Dserver.jetty.connection-idle-timeout=30s
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      ZENMO_JWT_SECRET: ${ZENMO_JWT_SECRET:?JWT secret must be set}
    volumes:
      - ${API_LOGS_PATH:-./logs/api}:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 900m

  ui:
    image: ghcr.io/aliandr13/zenmo-ui:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # For HTTPS on zenmo.fyi, add: ./zenmo-ui/caddy/Caddyfile.production:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 150m

volumes:
  postgres_data:
  caddy_data:

networks:
  internal:
    driver: bridge
