# Production tuning for ~2GB RAM VPS (Docker Compose)
# Loaded via: postgres -c config_file=/etc/postgresql/postgresql.conf

listen_addresses = '*'

# Memory
shared_buffers = 256MB
work_mem = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 512MB
max_connections = 30

# WAL / Checkpoints
checkpoint_completion_target = 0.9
wal_buffers = 8MB
min_wal_size = 128MB
max_wal_size = 512MB

# Performance
random_page_cost = 1.1
effective_io_concurrency = 200

# Logging (lightweight)
log_min_duration_statement = 500ms
log_checkpoints = off
log_connections = off
log_disconnections = off

# Autovacuum
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 20s
autovacuum_vacuum_scale_factor = 0.15